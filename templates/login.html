<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TGM Finance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0b1f35 0%, #0f3352 50%, #0d4a3a 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 44px 36px;
      width: 100%; max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
    }
    .login-logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 30px;
    }
    .login-badge {
      width: 46px; height: 46px; border-radius: 12px;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: #fff;
    }
    .login-brand strong { display: block; font-size: 20px; font-weight: 800; color: #0b1f35; }
    .login-brand span   { font-size: 12px; color: #5f7d90; letter-spacing: 1px; text-transform: uppercase; }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #1a3040; }
    p.sub { font-size: 13.5px; color: #5f7d90; margin-bottom: 26px; }
    .login-card .form-group { margin-bottom: 16px; }
    .login-card label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; color: #1a3040; }
    .login-card input { width: 100%; padding: 10px 14px; border: 1.5px solid #d4e3ed; border-radius: 10px; font-size: 14px; outline: none; }
    .login-card input:focus { border-color: #0d9488; }
    .login-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s;
    }
    .login-btn:hover { opacity: .88; }
    .login-err {
      background: #fee2e2; color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 9px; padding: 10px 14px;
      font-size: 13.5px; margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-badge">T</div>
      <div class="login-brand">
        <strong>TGM Finance</strong>
        <span>Commission Tracker</span>
      </div>
    </div>
    <h2>Welcome back</h2>
    <p class="sub">Sign in to access your commission dashboard.</p>

    {% if error %}
      <div class="login-err">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" required autofocus placeholder="you@tgmfinance.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="login-btn">Sign in</button>
    </form>
  </div>
</body>
</html>
